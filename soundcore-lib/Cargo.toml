[package]
name = "soundcore-lib"
version = "0.1.0"
edition = "2021"

[features]
# Set default to bluetooth
default = ["bluetooth"]
bluetooth = ["dep:btleplug", "dep:windows"]

[lib]
crate-type = ["lib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.29.1", features = ["time", "macros", "sync", "rt"] }
uuid = "1.4.0"
async-trait = "0.1.69"
thiserror = "1.0.40"
log = "0.4.19"
phf = { version = "0.11", default-features = false, features = ["macros"] } 
typeshare = "1.0.1"
enum_dispatch = "0.3.11"
weak-table = "0.3.2"


[target.'cfg(any(target_os = "linux", target_os = "macos"))'.dependencies]
btleplug = { version = "0.10.5", optional = true }

[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.48", optional = true, features = [
    "Storage_Streams",
    "Foundation",
    "implement",
    "Foundation_Collections",
    "Devices_Enumeration",
    "Devices_Bluetooth",
    "Devices_Bluetooth_GenericAttributeProfile",
    "Devices_Bluetooth_Advertisement"
] }
