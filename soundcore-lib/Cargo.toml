[package]
name = "soundcore-lib"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["lib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.28.2", features = ["time", "macros", "rt-multi-thread"] }
uuid = "1.3.3"
async-trait = "0.1.68"
thiserror = "1.0.40"
log = "0.4.18"
phf = { version = "0.11", default-features = false, features = ["macros"] } 
typeshare = "1.0.1"

[target.'cfg(any(target_os = "linux", target_os = "macos"))'.dependencies]
btleplug = { version = "0.10", optional = true }

[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.48", optional = true, features = [
    "Storage_Streams",
    "Foundation",
    "implement",
    "Foundation_Collections",
    "Devices_Enumeration",
    "Devices_Bluetooth",
    "Devices_Bluetooth_GenericAttributeProfile",
] }